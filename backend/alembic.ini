# Alembic configuration file
# This file is read by alembic commands.

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template for revision file names
file_template = %%(rev)s_%%(slug)s

# Database URL is read from the environment variable DATABASE_URL
# This avoids hardcoding credentials in this file.
sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
