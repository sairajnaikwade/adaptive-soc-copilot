version: "3.9"

# =============================================================================
# Adaptive SOC CoPilot — Docker Compose
# Services: PostgreSQL 16 + FastAPI Backend
# Network: Isolated bridge network for service communication
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: soc_copilot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soc_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-soc_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soc_secret_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-soc_admin} -d ${POSTGRES_DB:-soc_copilot}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - soc_network

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: soc_copilot_backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-soc_admin}:${POSTGRES_PASSWORD:-soc_secret_pass}@db:5432/${POSTGRES_DB:-soc_copilot}
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-very-long-random-secret-key-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # Application
      APP_NAME: ${APP_NAME:-Adaptive SOC CoPilot}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      # CORS (comma-separated list of allowed origins)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      # Email (Gmail SMTP)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-SOC CoPilot}
      # ML model storage path inside container
      MODEL_STORAGE_PATH: ${MODEL_STORAGE_PATH:-/app/ml_models}
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for live reload in development
      - ./backend:/app
      # Persist trained ML models
      - ml_models:/app/ml_models
    depends_on:
      db:
        condition: service_healthy
    networks:
      - soc_network

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  ml_models:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  soc_network:
    driver: bridge
    name: soc_copilot_network
